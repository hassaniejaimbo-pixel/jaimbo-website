# ===========================
# NETLIFY DEPLOYMENT CONFIG
# ===========================

[build]
  command   = "npm install"
  publish   = "public"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "18"

# Redirect /api/contact to the Netlify serverless function
[[redirects]]
  from   = "/api/contact"
  to     = "/.netlify/functions/contact"
  status = 200

# SPA fallback — serve index.html for all unknown routes
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
